<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add User</title>
    <link rel="stylesheet" href="/static/style.css">
    <script defer src="/static/decor.js"></script>
</head>
<body>
    <nav class="navbar">
            <button onclick="window.location.href='/'">Home</button>
    </nav>
    
    <main class="page-shell">
        <section class="card add-user-form">
        <h1>Add User</h1>
        <form id="addUserForm">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <label for="password">Password:</label>
            <div class="password-field">
            <input type="password" id="password" name="password" required>
            <label for="confirm_password">Confirm Password:</label>
            <input type="password" id="confirm_password" name="confirm_password" required>
            <button type="button" id="togglePassword" class="toggle-password-btn">Show Password</button>
            </div>
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required>
            <button type="submit">Add User</button>
        </form>
        </section>
    </main>

    <script>
document.getElementById('addUserForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirm_password').value;
    const username = document.getElementById('username').value;

    if (password !== confirmPassword) {
        alert("Passwords do not match.");
        return;
    }
    const response = await fetch('/add_user', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ name, email, password, username })
    });
    const result = await response.json();
    alert(result.message);
    document.getElementById('addUserForm').reset();
});

document.getElementById('togglePassword').addEventListener('click', () => {
    const passwordField = document.getElementById('password');
    const confirmPasswordField = document.getElementById('confirm_password');
    const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
    passwordField.setAttribute('type', type);
    confirmPasswordField.setAttribute('type', type);
    document.getElementById('togglePassword').textContent = type === 'password' ? 'Show Password' : 'Hide Password';
});
    </script>
</body>
</html>
