<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Business Details</title>
    <link rel="stylesheet" href="/static/style.css">
    <script defer src="/static/decor.js"></script>

</head>
<body>
    <nav class="navbar">
            <button onclick="window.location.href='/'">Home</button>
    </nav>
    <main class="page-shell">
        <section class="card edit-business-form">
            <h1>Edit Business Profile Photo</h1>
            <div class="profile-badge">
                    {% if user["business_logo_url"] %}
                    <img src='{{ user["business_logo_url"] }}' alt='{{ user["business_name"] }}' class="business-logo">
                    {% else %}
                    <span class="business-fallback" aria-hidden="true">{{ user["business_name"][0] if user["business_name"] else user["name"][0] }}</span>
                    {% endif %}
                </div>
            <form id="uploadLogoForm" enctype="multipart/form-data">
                <label for="file">Upload New Logo:</label>
                <input type="file" id="file" name="file" accept="image/*" required>
                <button type="submit">Upload</button>
            </form>

            <br><br>

            <h1>Edit Business Details</h1>
            <h4 style="color: red; font-family: monospace;">(*) REQUIRED FIELDS</h4>
            <form id="editBusinessForm">
                <label for="name">*Name:</label>
                <input type="text" id="name" name="name" value="{{ user.name }}" required>
                <label for="password">*Password:</label>
                <input type="password" id="password" name="password" value="{{ user.password }}" required>
                <label for="contact">*Contact:</label>
                <input type="text" id="contact" name="contact" value="{{ user.contact }}" required>
                <label for="business_name">*Business Name:</label>
                <input type="text" id="business_name" name="business_name" value="{{ user.business_name }}" required>
                <label for="business_email">*Business Email:</label>
                <input type="email" id="business_email" name="business_email" value="{{ user.business_email }}" required>
                <label for="business_bio">*Business Bio:</label>
                <textarea id="business_bio" name="business_bio" required>{{ user.business_bio }}</textarea>
                <label for="optional_address">Address (Optional but recommended):</label>
                <input type="text" id="optional_address" name="optional_address" value="{{ user.optional_address }}">
                <label for="whatsapp_number">WhatsApp Number (Optional but recommended):</label>
                <input type="text" id="whatsapp_number" name="whatsapp_number" value="{{ user.whatsapp_number }}">
                <label for="business_website">Business Website (Optional):</label>
                <input type="text" id="business_website" name="business_website" value="{{ user.business_website }}">
                <label for="optional_insta">Instagram Link (Optional):</label>
                <input type="text" id="optional_insta" name="optional_insta" value="{{ user.optional_insta }}">
                <label for="optional_facebook">Facebook Link (Optional):</label>
                <input type="text" id="optional_facebook" name="optional_facebook" value="{{ user.optional_facebook }}">
                <label for="optional_youtube">YouTube Link (Optional):</label>
                <input type="text" id="optional_youtube" name="optional_youtube" value="{{ user.optional_youtube }}">
                <button type="submit">Update</button>
            </form>
        </section>
    </main>
    <script>
        document.getElementById('editBusinessForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = {
                name: document.getElementById('name').value,
                password: document.getElementById('password').value,
                contact: document.getElementById('contact').value,
                business_name: document.getElementById('business_name').value,
                business_bio: document.getElementById('business_bio').value,
                business_website: document.getElementById('business_website').value,
                business_email: document.getElementById('business_email').value,
                optional_address: document.getElementById('optional_address').value,
                whatsapp_number: document.getElementById('whatsapp_number').value,
                optional_insta: document.getElementById('optional_insta').value,
                optional_facebook: document.getElementById('optional_facebook').value,
                optional_youtube: document.getElementById('optional_youtube').value
            };

            const response = await fetch('/edit_business_details/{{ user.username }}', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(formData)
            });
            const result = await response.json();
            alert(result.message);
            if (response.ok) {
                window.location.href = '/business/{{ user.username }}';
            }
        });


         document.getElementById('uploadLogoForm').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const formData = new FormData();
                    const fileInput = document.getElementById('file');
                    if (fileInput.files.length === 0) {
                        alert("Please select a file to upload.");
                        return;
                    }
                    formData.append('file', fileInput.files[0]);

                    const response = await fetch('/edit_business_details/{{ user.username }}/upload_edit_logo', {
                        method: 'POST',
                        body: formData
                    });
                    const result = await response.json();
                    alert(result.message);
                    if (response.ok) {
                        // Update the displayed logo without reloading the page
                        const logoImg = document.querySelector('.business-logo');
                        if (logoImg) {
                            logoImg.src = result.logo_url;
                        } else {
                            // If the logo image doesn't exist, create it
                            const profileBadge = document.querySelector('.profile-badge');
                            const newImg = document.createElement('img');
                            newImg.src = result.logo_url;
                            newImg.alt = '{{ user.business_name }}';
                            newImg.className = 'business-logo';
                            profileBadge.innerHTML = ''; // Clear any fallback text
                            profileBadge.appendChild(newImg);
                        }
                    }
                });
    </script>
</body>
</html>
