<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete User</title>
    <link rel="stylesheet" href="/static/style.css">
    <script defer src="/static/decor.js"></script>
</head>
<body>
    <nav class="navbar">
            <button onclick="window.location.href='/'">Home</button>
    </nav>
    <main class="page-shell">
        <section class="card delete-user-form">
            <h1>Delete User</h1>
            <form id="deleteUserForm">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required>
                <button type="submit">Delete User</button>
            </form>
        </section>
    </main>

    <script>

        // send confirmation prompt before deleting user
        document.getElementById('deleteUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const confirmation = confirm(`Are you sure you want to delete the user '${username}'? This action cannot be undone.`);
            if (confirmation) {
                const response = await fetch('/delete_user', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username })
                });
                const result = await response.json();
                alert(result.message);
            } else {
                alert("User deletion canceled.");
            }
        });
</script>
</body>
</html>
